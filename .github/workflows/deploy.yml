name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.prep.outputs.tag }}

    steps:
    - uses: actions/checkout@v4

    - name: Prepare Image Tag
      id: prep
      run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean package -DskipTests

    - name: Build and Push Docker Image using Jib
      run: |
        mvn com.google.cloud.tools:jib-maven-plugin:build \
          -Dimage=docker.io/eazylearning/s3-demo-application:${{ steps.prep.outputs.tag }} \
          -Djib.to.auth.username=${{ secrets.DOCKER_USERNAME }} \
          -Djib.to.auth.password=${{ secrets.DOCKERHUB_TOKEN }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # Login to Docker Hub
          docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}
          
          # Stop and remove existing container if it exists
          docker stop s3-demo-app || true
          docker rm s3-demo-app || true
          
          # Pull the new image version
          docker pull eazylearning/s3-demo-application:${{ needs.build.outputs.image_tag }}
          
          # Run the new container
          docker run -d \
            --name s3-demo-app \
            -p 8080:8080 \
            -e AWS_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY }} \
            -e AWS_SECRET_KEY=${{ secrets.AWS_SECRET_KEY }} \
            -e AWS_REGION=${{ secrets.AWS_REGION }} \
            -e AWS_BUCKET_NAME=${{ secrets.AWS_BUCKET_NAME }} \
            eazylearning/s3-demo-application:${{ needs.build.outputs.image_tag }}
          
          # Clean up old images to save space
          docker image prune -a -f
